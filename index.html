<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StormStream</title>    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
            background-color: #95989b !important; 
        }

        #map { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
            background: #95989b !important; 
        }

        .leaflet-popup-pane {
            z-index: 10000000 !important;
        }

        .leaflet-popup-content-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
        }
        
        .leaflet-popup-tip {
            background: transparent !important;
            box-shadow: none !important;
        }

        .leaflet-popup-content {
            margin: 0 !important;
        }

        .radar-broadcast-pane {
            pointer-events: none !important; 
        }

        .mrms-color-matrix {
            filter: saturate(2.3) contrast(1.4) brightness(0.9) hue-rotate(-12deg) !important;
        }

        #menu-toggle-trigger {
            position: fixed;
            top: 50px;
            left: 20px;
            z-index: 100000 !important;
            background: #ff6600; 
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: auto;
        }

        .hamburger-line {
            width: 18px;
            height: 3px;
            background: #000000; 
            border-radius: 2px;
        }

        #alerts-sidebar-trigger {
            position: fixed;
            top: 50px;
            right: 20px;
            z-index: 100000 !important;
            background: #ff6600;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            color: #000000 !important; 
            font-size: 20px;
        }

        .alerts-count-oval {
            position: absolute;
            top: -6px;
            left: -12px;
            background: #dc2626;
            color: #ffffff;
            font-family: monospace;
            font-weight: bold;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.25);
            min-width: 12px;
            text-align: center;
            line-height: 1;
        }

        #hud-panel { 
            position: fixed; 
            z-index: 99999 !important; 
            top: 105px; 
            left: 20px; 
            background: rgba(15, 16, 20, 0.96) !important; 
            padding: 14px 18px !important; 
            border-radius: 6px !important; 
            border: 2px solid #ff0055 !important; 
            color: #fff !important; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important; 
            width: 290px !important;
            pointer-events: auto !important; 
            box-sizing: border-box !important;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform-origin: top left;
        }

        #hud-panel.collapsed {
            opacity: 0 !important;
            transform: scale(0.8) translateY(-20px) !important;
            pointer-events: none !important;
        }

        .brand-container { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .brand-container h1 { margin: 0; font-size: 15px; color: #ff0055; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 900; }

        #alert-banner { 
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid #00d4ff; 
            border-radius: 4px; 
            padding: 10px 12px; 
            margin-top: 10px; 
            color: #e2e8f0; 
            font-size: 11.5px; 
            line-height: 1.5; 
        }
        #alert-banner b { color: #00d4ff; text-transform: uppercase; display: block; margin-bottom: 4px; font-size: 11px; }

        .radar-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 10px;
        }
        .radar-select-btn {
            background: #1f2026;
            border: 1px solid #3a3b45;
            color: #aaa;
            font-size: 10px;
            font-weight: bold;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .radar-select-btn.active {
            background: #00d4ff;
            border-color: #00d4ff;
            color: #000;
        }

        .station-selector-wrapper {
            margin-top: 8px;
            display: none;
        }
        .station-selector-wrapper.visible {
            display: block !important;
        }
        #radar-station-dropdown {
            width: 100% !important;
            background: #1a1b21 !important;
            border: 1px solid #00d4ff !important;
            color: #fff !important;
            padding: 6px 8px !important;
            border-radius: 4px !important;
            font-size: 11px !important;
            font-weight: bold !important;
            outline: none !important;
            max-height: 220px !important;
            box-sizing: border-box !important;
        }

        .search-container { 
            display: flex !important; 
            gap: 6px !important; 
            margin-top: 10px !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        #city-search-input { 
            background: #1f2026 !important; 
            border: 1px solid #3a3b45 !important; 
            color: #fff !important; 
            padding: 6px 10px !important; 
            border-radius: 4px !important; 
            font-size: 12px !important; 
            flex-grow: 1 !important;
            width: 10px !important; 
            box-sizing: border-box !important;
        }
        #search-btn { 
            background: #ff0055 !important; 
            border: none !important; 
            color: #fff !important; 
            padding: 6px 14px !important; 
            border-radius: 4px !important; 
            cursor: pointer !important; 
            font-weight: bold !important;
            font-size: 12px !important;
            flex-shrink: 0 !important;
        }

        #playback-bar { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; background: #15161c; padding: 6px 10px; border-radius: 4px; }
        #play-btn { background: #22c55e; border: none; color: white; padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; }
        #time-display { font-size: 11px; font-family: monospace; color: #22c55e; font-weight: bold; }

        #right-alerts-sidebar {
            position: fixed;
            top: 105px;
            right: 20px;
            width: 320px;
            height: calc(100vh - 125px);
            background: rgba(15, 16, 20, 0.96);
            border: 2px solid #2a2c35;
            border-radius: 6px;
            color: #ffffff;
            z-index: 99999 !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            pointer-events: auto;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform-origin: top right;
        }

        #right-alerts-sidebar.collapsed {
            opacity: 0 !important;
            transform: scale(0.8) translateY(-20px) !important;
            pointer-events: none !important;
        }

        .sidebar-header-title {
            padding: 12px 14px 4px 14px;
            font-size: 11px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .sidebar-counter-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #10b981;
            border-radius: 4px;
            padding: 6px 10px;
            margin: 0 14px 10px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: monospace;
            font-size: 10px;
            font-weight: bold;
            color: #e2e8f0;
            text-transform: uppercase;
        }

        .live-pulse-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
        }

        .sidebar-scroll-feed {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 14px 14px 14px;
            box-sizing: border-box;
        }

        .sidebar-feed-card {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 0;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .sidebar-feed-card:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .sidebar-feed-card .card-badge {
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .sidebar-feed-card .card-sectors {
            font-size: 10px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 2px;
        }

        /* CONTAINER DESIGN LAYOUTS OVERRIDES Matrix */
        .nws-screenshot-popup-container {
            width: 250px;
            padding: 12px;
            border-radius: 4px;
            color: #ffffff;
            font-family: Arial, sans-serif;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .nws-screenshot-popup-container.theme-severe {
            background: linear-gradient(135deg, #7c8803 0%, #4e5501 100%);
            border: 1px solid #99a605;
        }
        .nws-screenshot-popup-container.theme-tornado {
            background: linear-gradient(135deg, #b90202 0%, #6e0101 100%);
            border: 1px solid #d40404;
        }
        
        /* UNIFIED PDS THEME ARRAY (PURPLE GRADIENT): Applied dynamically to any PDS layout frame */
        .nws-screenshot-popup-container.theme-pds-tornado,
        .nws-screenshot-popup-container.theme-pds-severe,
        .nws-screenshot-popup-container.theme-pds-flashflood,
        .nws-screenshot-popup-container.theme-pds-flood {
            background: linear-gradient(135deg, #a200a2 0%, #4a004e 100%);
            border: 1px solid #d900d9;
            padding-top: 28px !important;
        }
        
        .pds-top-red-alert-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: #cc0000;
            color: #ffffff;
            font-weight: 900;
            font-size: 8.5px;
            text-align: center;
            padding: 4px 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 1px solid #ff4d4d;
        }

        .nws-screenshot-popup-container.theme-flashflood {
            background: linear-gradient(135deg, #10b981 0%, #065f46 100%);
            border: 1px solid #10b981;
        }
        .nws-screenshot-popup-container.theme-flood {
            background: linear-gradient(135deg, #065f46 0%, #022c22 100%);
            border: 1px solid #047857;
        }
        
        .popup-header-title {
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .popup-header-expiry {
            font-size: 9.5px;
            font-weight: bold;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 2px;
        }
        
        .popup-timeline-track {
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            margin: 6px 0 8px 0;
            border-radius: 1px;
            overflow: hidden;
        }
        .popup-timeline-fill {
            height: 100%;
            background: #ffffff;
            width: 65%;
        }

        .popup-row-counties {
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 8px;
            border-radius: 3px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .popup-row-counties span.label {
            font-weight: 900;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
        }
        .popup-row-counties span.label::before {
            content: "●";
            font-size: 8px;
            color: #ffffff;
        }
        .popup-row-counties span.names {
            font-weight: bold;
            text-align: right;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .popup-glass-block {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            padding: 5px;
            text-align: center;
            margin-bottom: 4px;
        }
        .popup-glass-block span.title {
            display: block;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.3px;
        }
        .popup-glass-block span.val {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-top: 1px;
        }

        .popup-grid-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        .popup-action-btn-row {
            margin-top: 6px;
            display: flex;
            justify-content: flex-end;
        }
        .popup-txt-trigger {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 9px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 2px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #dbz-legend {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw; 
            z-index: 999999 !important;
            background: rgba(10, 11, 15, 0.96);
            border-bottom: 2px solid #2a2c35;
            padding: 6px 0 4px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="raw-text-modal-backdrop" onclick="closeNwsTextStatementModal()">
        <div id="raw-text-modal-window" onclick="event.stopPropagation()">
            <div class="modal-header-bar">
                <span id="modal-title-element">NWS METEOROLOGICAL PRODUCT</span>
                <button style="background:transparent; border:none; color:#fff; font-size:20px; cursor:pointer;" onclick="closeNwsTextStatementModal()">✕</button>
            </div>
            <div id="modal-body-element" class="modal-body-content">Loading statement data...</div>
        </div>
    </div>

    <div id="right-alerts-sidebar" class="collapsed">
        <div class="sidebar-header-title">Live NWS Alerts Feed</div>
        <div class="sidebar-counter-box">
            <div class="live-pulse-dot"></div>
            Live Counter: <span id="sidebar-counter-string">0</span> Active Hazards National
        </div>
        <div class="sidebar-scroll-feed" id="sidebar-feed-container"></div>
    </div>

    <div style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 99999; pointer-events: none;">
        <div id="menu-toggle-trigger" onclick="toggleTopLeftControlPanel()">
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
        </div>

        <div id="alerts-sidebar-trigger" onclick="toggleRightAlertsSidebarPanel()">
            <div class="alerts-count-oval" id="badge-counter-element">--</div>
            ⚠️
        </div>

        <div id="hud-panel" class="collapsed">
            <div class="brand-container"><h1>StormStream</h1></div>
            <div id="alert-banner">
                <b>Forecast Highlights</b>
                <div>Active hazards tracking enabled loop cycles.</div>
            </div>
            <div class="radar-type-grid">
                <button id="radar-us-btn" class="radar-select-btn active" onclick="switchRadarMode('national')">MRMS</button>
                <button id="radar-site-btn" class="radar-select-btn" onclick="switchRadarMode('single')">Single-Site</button>
            </div>
            <div id="station-toggle-box" class="station-selector-wrapper">
                <select id="radar-station-dropdown" onchange="executeStationChangeToggle()"></select>
            </div>
            <div class="search-container">
                <input type="text" id="city-search-input" value="Lincoln County, MO">
                <button id="search-btn" onclick="executeLocalTargetReset()">Go</button>
            </div>
            <div id="playback-bar">
                <button id="play-btn" onclick="togglePlayback()">PAUSE</button>
                <div id="time-display">TIME: --:--</div>
            </div>
        </div>

        <div id="dbz-legend">
            <div style="width: 100vw;">
                <div class="gradient-bar"></div>
                <div style="display: flex; justify-content: space-between; width: 100%; box-sizing: border-box; padding: 4px 10px; font-family: monospace; font-size: 10.5px; font-weight: bold; color: #aaa;">
                    <div>0 dBZ</div><div>20 dBZ</div><div>40 dBZ</div><div>60 dBZ</div><div>80 dBZ</div><div>100 dBZ</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        var map;
        var playbackActive = true;
        var masterAlertFeatures = [];
        var instantAlertCount = 0;
        var radarLayers = [];
        var radarFramesPaths = []; 
        var currentRadarIndex = 0;
        var polygonAlertGroup;
        var currentRadarMode = 'national';
        var singleSiteRadarLayer = null;
        var singleSiteBorderCircle = null; 
        var currentActiveGlobalPath = ""; 
        var animationIntervalId = null;
        var activeNwsTextMapCache = {}; 

        var centerLat = 38.9742;
        var centerLng = -90.9664;

        var fullUSRadarDictionary = [
            { id: "abc", lat: 40.65, lon: -111.43, name: "Salt Lake City, UT" },
            { id: "abr", lat: 45.46, lon: -98.41, name: "Aberdeen, SD" },
            { id: "lsx", lat: 38.97, lon: -90.96, name: "St. Louis, MO" },
            { id: "meg", lat: 35.34, lon: -89.87, name: "Memphis, TN" },
            { id: "okx", lat: 40.87, lon: -72.86, name: "New York City/Upton, NY" }
        ];

        window.onload = function() {
            map = L.map('map', {
                center: [centerLat, centerLng],
                zoom: 5, minZoom: 3, maxZoom: 18, zoomControl: false
            });

            map.createPane('tilePane').style.zIndex = 200;
            map.createPane('usMosaicPane').style.zIndex = 390;
            map.getPane('usMosaicPane').className += ' radar-broadcast-pane mrms-color-matrix';
            map.createPane('singleSitePane').style.zIndex = 400;
            map.getPane('singleSitePane').className += ' radar-broadcast-pane';
            
            map.createPane('alertsPane').style.zIndex = 300; 
            map.createPane('labelsPane').style.zIndex = 800;

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { pane: 'tilePane', opacity: 0.18 }).addTo(map);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { pane: 'labelsPane', pointerEvents: 'none', opacity: 0.85 }).addTo(map);

            polygonAlertGroup = L.layerGroup().addTo(map);

            assembleCompleteNEXRADMenu();
            initRainViewerRadar();
            loadWeatherAlertPipeline();

            map.on('zoomend move moveend', recalibratePerimeterGradientMask);

            document.addEventListener("visibilitychange", function() {
                if (!document.hidden) loadWeatherAlertPipeline();
            });
        };

        function toggleTopLeftControlPanel() { document.getElementById('hud-panel').classList.toggle('collapsed'); }
        function toggleRightAlertsSidebarPanel() { document.getElementById('right-alerts-sidebar').classList.toggle('collapsed'); }
        function closeNwsTextStatementModal() { document.getElementById('raw-text-modal-backdrop').style.display = 'none'; }
        
        function launchNwsTextStatementModal(alertId) {
            var cachedRecord = activeNwsTextMapCache[alertId];
            if (!cachedRecord) return;
            document.getElementById('modal-title-element').innerText = cachedRecord.title.toUpperCase();
            document.getElementById('modal-body-element').innerText = cachedRecord.text;
            document.getElementById('raw-text-modal-backdrop').style.display = 'flex';
        }

        function loadWeatherAlertPipeline() {
            fetch("https://api.weather.gov/alerts/active?status=actual", {
                headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) StormStream/1.0' }
            })
            .then(response => response.json())
            .then(data => {
                if (data && data.features) {
                    masterAlertFeatures = data.features.filter(f => {
                        const ev = (f.properties.event || "").toUpperCase();
                        return ev.includes("WARNING");
                    });

                    document.getElementById('badge-counter-element').innerText = masterAlertFeatures.length;
                    document.getElementById('sidebar-counter-string').innerText = masterAlertFeatures.length;
                    
                    rebuildSidebarAlertFeedDOM();
                    plotWarningPolygonsOnMap();
                }
            }).catch(err => console.error(err));
        }

        function rebuildSidebarAlertFeedDOM() {
            let container = document.getElementById('sidebar-feed-container');
            if(!container) return; container.innerHTML = "";
            if(masterAlertFeatures.length === 0) {
                container.innerHTML = `<div style="font-size:11px; color:#64748b; padding:20px 0; text-align:center;">No active weather hazards.</div>`;
                return;
            }

            masterAlertFeatures.forEach(feature => {
                const prop = feature.properties || {};
                const id = prop.id || Math.random().toString();
                const eventName = prop.event || "Advisory";
                const eventUpper = eventName.toUpperCase();
                const sectors = (prop.areaDesc || "Regional Track").split(';')[0];

                let derivedHexValue = "#a855f7"; 
                if(eventUpper.includes("TORNADO")) { derivedHexValue = "#FF0000"; }
                else if(eventUpper.includes("SEVERE") && eventUpper.includes("THUNDERSTORM")) { derivedHexValue = "#FFAA00"; }
                else if(eventUpper.includes("FLASH") && eventUpper.includes("FLOOD")) { derivedHexValue = "#00FF00"; }
                else if(eventUpper.includes("FLOOD")) { derivedHexValue = "#008000"; }

                let cardNode = document.createElement('div');
                cardNode.className = "sidebar-feed-card";
                cardNode.onclick = () => { launchNwsTextStatementModal(id); };
                cardNode.innerHTML = `
                    <div class="card-badge" style="color: ${derivedHexValue} !important;">${eventName}</div>
                    <div class="card-sectors">Sector: ${sectors}</div>
                `;
                container.appendChild(cardNode);
            });
        }

        function plotWarningPolygonsOnMap() {
            polygonAlertGroup.clearLayers();

            masterAlertFeatures.forEach(feature => {
                if (!feature.geometry || !feature.geometry.coordinates) return;
                const properties = feature.properties || {};
                let eventName = properties.event || "Weather Event";
                const eventUpper = eventName.toUpperCase();
                const alertId = properties.id || Math.random().toString();

                const coreAdvisoryNarrative = properties.description || "";

                // DETECT PARTICULARLY DANGEROUS SITUATION FLAGS IN PRODUCT STATEMENT
                var textDumpToValidate = (coreAdvisoryNarrative + " " + (properties.headline || "")).toUpperCase();
                var isParticularlyDangerousSituation = textDumpToValidate.includes("PARTICULARLY DANGEROUS SITUATION") || textDumpToValidate.includes("PDS ");

                // UNIFIED THEME ASSIGNMENT CONFIGURATION
                let strokeColor = "#a855f7"; let fillAlpha = 0.20; let popupThemeClass = "theme-severe";
                let isTornado = eventUpper.includes("TORNADO");
                let isSevereThunder = eventUpper.includes("SEVERE") && eventUpper.includes("THUNDERSTORM");
                let isFlashFlood = eventUpper.includes("FLASH") && eventUpper.includes("FLOOD");
                let isStandardFlood = eventUpper.includes("FLOOD") && !eventUpper.includes("FLASH");

                if (isTornado) { 
                    strokeColor = "#FF0000"; fillAlpha = 0.25; popupThemeClass = "theme-tornado"; 
                } else if (isSevereThunder) { 
                    strokeColor = "#FFAA00"; fillAlpha = 0.20; popupThemeClass = "theme-severe"; 
                } else if (isFlashFlood) { 
                    strokeColor = "#00FF00"; fillAlpha = 0.22; popupThemeClass = "theme-flashflood"; 
                } else if (isStandardFlood) { 
                    strokeColor = "#008000"; fillAlpha = 0.22; popupThemeClass = "theme-flood"; 
                }

                // DYNAMIC SYNCHRONIZER HOOK: If PDS tag is found, force polygon color to deep magenta purple (#d900d9) system-wide
                let pdsRedBannerHeaderString = "";
                if (isParticularlyDangerousSituation) {
                    strokeColor = "#d900d9"; 
                    fillAlpha = 0.28;
                    
                    if (isTornado) {
                        eventName = "PDS Tornado Warning";
                        popupThemeClass = "theme-pds-tornado";
                        pdsRedBannerHeaderString = `<div class="pds-top-red-alert-banner">CONFIRMED TORNADO • TAKE SHELTER NOW!</div>`;
                    } else if (isSevereThunder) {
                        eventName = "PDS Severe Thunderstorm Warning";
                        popupThemeClass = "theme-pds-severe";
                        pdsRedBannerHeaderString = `<div class="pds-top-red-alert-banner">PDS SEVERE THUNDERSTORM • TAKE COVER NOW!</div>`;
                    } else if (isFlashFlood) {
                        eventName = "PDS Flash Flood Warning";
                        popupThemeClass = "theme-pds-flashflood";
                        pdsRedBannerHeaderString = `<div class="pds-top-red-alert-banner">FLASH FLOOD EMERGENCY • SEEK HIGH GROUND!</div>`;
                    } else {
                        eventName = "PDS Flood Warning";
                        popupThemeClass = "theme-pds-flood";
                        pdsRedBannerHeaderString = `<div class="pds-top-red-alert-banner">CRITICAL FLOODING EMERGENCY • STAY SAFE!</div>`;
                    }
                }

                const parsedSectors = properties.areaDesc ? properties.areaDesc.split(';')[0] : "Regional Sector";

                var extractedHazardText = "Radar Indicated";
                var hazardMatchPattern = /HAZARD\.\.\.(.+)/i.exec(coreAdvisoryNarrative);
                if (hazardMatchPattern && hazardMatchPattern[1]) extractedHazardText = hazardMatchPattern[1].split('$$')[0].split('&&')[0].trim();

                var extractedSourceText = "Radar Indicated";
                var sourceMatchPattern = /SOURCE\.\.\.(.+)/i.exec(coreAdvisoryNarrative);
                if (sourceMatchPattern && sourceMatchPattern[1]) extractedSourceText = sourceMatchPattern[1].split('$$')[0].split('&&')[0].trim();

                var extractedWindText = "60 MPH";
                var windMatchPattern = /WIND\.\.\.(.+)/i.exec(coreAdvisoryNarrative);
                if (windMatchPattern && windMatchPattern[1]) extractedWindText = windMatchPattern[1].split('$$')[0].split('&&')[0].trim();

                var extractedHailText = "Penny Size";
                var hailMatchPattern = /HAIL\.\.\.(.+)/i.exec(coreAdvisoryNarrative);
                if (hailMatchPattern && hailMatchPattern[1]) extractedHailText = hailMatchPattern[1].split('$$')[0].split('&&')[0].trim();

                var riskThreat = "";
                var threatMatchPattern = /DAMAGE THREAT\.\.\.(.+)/i.exec(coreAdvisoryNarrative);
                if (threatMatchPattern && threatMatchPattern[1]) riskThreat = threatMatchPattern[1].split('$$')[0].split('&&')[0].trim();

                var timeRemainingLabel = "ACTIVE ALERT";
                if (properties.ends) {
                    var endTimestamp = new Date(properties.ends).getTime();
                    var durationMinutesDiff = Math.ceil((endTimestamp - Date.now()) / (1000 * 60));
                    if (durationMinutesDiff > 0) timeRemainingLabel = `EXPIRES IN ${durationMinutesDiff} MIN`;
                }

                activeNwsTextMapCache[alertId] = { title: eventName, text: coreAdvisoryNarrative.trim() };

                let interactivePillGridTemplate = "";
                if (isTornado) {
                    interactivePillGridTemplate = `
                        <div class="popup-glass-block"><span class="title">Tornado</span><span class="val">${extractedHazardText}</span></div>
                        <div class="popup-glass-block"><span class="title">Hail</span><span class="val">${extractedHailText}</span></div>
                        <div class="popup-glass-block"><span class="title">Damage Threat</span><span class="val">${riskThreat || (isParticularlyDangerousSituation ? 'Catastrophic' : 'Standard')}</span></div>`;
                } else if (isSevereThunder) {
                    interactivePillGridTemplate = `
                        <div class="popup-glass-block"><span class="title">Tornado</span><span class="val">Possible</span></div>
                        <div class="popup-grid-split">
                            <div class="popup-glass-block"><span class="title">Wind</span><span class="val">${extractedWindText}</span></div>
                            <div class="popup-glass-block"><span class="title">Hail</span><span class="val">${extractedHailText}</span></div>
                        </div>
                        <div class="popup-glass-block"><span class="title">Damage Threat</span><span class="val">${riskThreat || 'Considerable'}</span></div>`;
                } else if (isFlashFlood) {
                    let threatBlockMarkup = "";
                    if (riskThreat) {
                        threatBlockMarkup = `<div class="popup-glass-block"><span class="title">Damage Threat</span><span class="val">${riskThreat}</span></div>`;
                    }
                    interactivePillGridTemplate = `
                        <div class="popup-glass-block"><span class="title">Source</span><span class="val">${extractedSourceText}</span></div>
                        ${threatBlockMarkup}`;
                } else if (isStandardFlood) {
                    interactivePillGridTemplate = "";
                }

                L.geoJSON(feature, {
                    pane: 'alertsPane', 
                    // STROKE AND FILL ATTRIBUTES LINKED DIRECTLY TO THE SYNC ENGINE ABOVE
                    style: { stroke: true, color: strokeColor, weight: 1.8, opacity: 0.95, fillColor: strokeColor, fillOpacity: fillAlpha },
                    onEachFeature: function(f, layer) {
                        layer.bindPopup(`
                            <div class="nws-screenshot-popup-container ${popupThemeClass}">
                                ${pdsRedBannerHeaderString}
                                <div class="popup-header-title">${eventName}</div>
                                <div class="popup-header-expiry">${timeRemainingLabel}</div>
                                <div class="popup-timeline-track"><div class="popup-timeline-fill"></div></div>
                                <div class="popup-row-counties"><span class="label">Counties</span><span class="names" title="${parsedSectors}">${parsedSectors}</span></div>
                                ${interactivePillGridTemplate}
                                <div class="popup-action-btn-row"><button class="popup-txt-trigger" onclick="launchNwsTextStatementModal('${alertId}')">View Text</button></div>
                            </div>
                        `, { maxWidth: 280, closeButton: false });
                    }
                }).addTo(polygonAlertGroup);
            });
        }

        function initRainViewerRadar() {
            fetch("https://api.rainviewer.com/public/weather-maps.json")
                .then(res => res.json())
                .then(metadata => {
                    radarFramesPaths = metadata.radar.past.slice(-5).map(f => f.path);
                    currentActiveGlobalPath = radarFramesPaths[radarFramesPaths.length - 1];
                    var timeBracketToken = Math.floor(Date.now() / 600000);
                    
                    radarFramesPaths.forEach((path) => {
                        const radarLayer = L.tileLayer('https://tilecache.rainviewer.com' + path + '/256/{z}/{x}/{y}/2/0_0.png?cb=' + timeBracketToken, {
                            opacity: 0.0, maxNativeZoom: 7, maxZoom: 18, pane: 'usMosaicPane' 
                        });
                        radarLayer.addTo(map);
                        radarLayers.push(radarLayer);
                    });

                    if(radarLayers.length > 0) {
                        radarLayers[radarLayers.length - 1].setOpacity(0.85); 
                        currentRadarIndex = radarLayers.length - 1;
                        animationIntervalId = setInterval(animateRadarFrames, 1200); 
                    }
                }).catch(err => console.error(err));
        }

        function animateRadarFrames() {
            if (!playbackActive || radarLayers.length === 0 || currentRadarMode !== 'national') return;
            radarLayers[currentRadarIndex].setOpacity(0.0);
            currentRadarIndex = (currentRadarIndex + 1) % radarLayers.length;
            radarLayers[currentRadarIndex].setOpacity(0.85);
        }

        function switchRadarMode(mode) {
            currentRadarMode = mode;
            document.getElementById('radar-us-btn').classList.remove('active');
            document.getElementById('radar-site-btn').classList.remove('active');
            document.getElementById('station-toggle-box').classList.remove('visible');
            if (animationIntervalId) { clearInterval(animationIntervalId); animationIntervalId = null; }
            if(singleSiteRadarLayer) { map.removeLayer(singleSiteRadarLayer); singleSiteRadarLayer = null; }
            if(singleSiteBorderCircle) { map.removeLayer(singleSiteBorderCircle); singleSiteBorderCircle = null; }

            if(mode === 'national') {
                document.getElementById('radar-us-btn').classList.add('active');
                map.getPane('usMosaicPane').style.display = 'block';
                map.getPane('singleSitePane').style.display = 'none';
                if(radarLayers.length > 0) {
                    radarLayers[currentRadarIndex].setOpacity(0.85);
                    animationIntervalId = setInterval(animateRadarFrames, 1200);
                }
            } else {
                document.getElementById('radar-site-btn').classList.add('active');
                document.getElementById('station-toggle-box').classList.add('visible');
                map.getPane('usMosaicPane').style.display = 'none';
                map.getPane('singleSitePane').style.display = 'block';
                radarLayers.forEach(l => l.setOpacity(0.0));
                loadSingleSiteRadar();
            }
        }

        function loadSingleSiteRadar() {
            var dropdown = document.getElementById('radar-station-dropdown');
            var selectedOption = dropdown.options[dropdown.selectedIndex];
            if (!selectedOption) return;
            var lat = parseFloat(selectedOption.getAttribute('data-lat'));
            var lon = parseFloat(selectedOption.getAttribute('data-lon'));

            singleSiteBorderCircle = L.circle([lat, lon], { radius: 250000, color: '#000000', weight: 2.0, fillColor: 'transparent', pane: 'labelsPane' }).addTo(map);
            var targetTilePath = currentActiveGlobalPath ? currentActiveGlobalPath : "/v2/radar/nowcast";
            var timeBracketToken = Math.floor(Date.now() / 600000);

            singleSiteRadarLayer = L.tileLayer('https://tilecache.rainviewer.com' + targetTilePath + '/256/{z}/{x}/{y}/1/1_1.png?cb=' + timeBracketToken, {
                opacity: 0.85, pane: 'singleSitePane', maxNativeZoom: 12, maxZoom: 18
            }).addTo(map);
            recalibratePerimeterGradientMask();
        }

        function assembleCompleteNEXRADMenu() {
            const dropdown = document.getElementById('radar-station-dropdown');
            if (!dropdown) return; dropdown.innerHTML = ""; 
            fullUSRadarDictionary.sort((a, b) => a.name.localeCompare(b.name));
            fullUSRadarDictionary.forEach(station => {
                let node = document.createElement('option');
                node.value = station.id; node.setAttribute('data-lat', station.lat); node.setAttribute('data-lon', station.lon);
                node.text = `${station.name} (K${station.id.toUpperCase()})`; dropdown.appendChild(node);
            });
            dropdown.value = "lsx"; 
        }

        function recalibratePerimeterGradientMask() {
            if (currentRadarMode !== 'single' || !singleSiteBorderCircle) return;
            var centerPointCoordinates = map.latLngToContainerPoint(singleSiteBorderCircle.getLatLng());
            var initialLatLng = singleSiteBorderCircle.getLatLng();
            var offsetLongitudeBound = initialLatLng.lng + (250000 / (111320 * Math.cos(initialLatLng.lat * Math.PI / 180)));
            var liveRadiusPixels = Math.abs(map.latLngToContainerPoint(L.latLng(initialLatLng.lat, offsetLongitudeBound)).x - centerPointCoordinates.x);
            var paneElement = map.getPane('singleSitePane');
            if (paneElement) {
                var gradientMaskString = 'radial-gradient(circle ' + liveRadiusPixels + 'px at ' + centerPointCoordinates.x + 'px ' + centerPointCoordinates.y + 'px, rgba(0,0,0,1) 100%, rgba(0,0,0,0) 100%)';
                paneElement.style.maskImage = gradientMaskString; paneElement.style.webkitMaskImage = gradientMaskString;
            }
        }

        function executeStationChangeToggle() { if (currentRadarMode === 'single') loadSingleSiteRadar(); }
        function togglePlayback() { playbackActive = !playbackActive; document.getElementById('play-btn').innerText = playbackActive ? "PAUSE" : "RESUME"; }
        
        function executeLocalTargetReset() {
            var locationInput = document.getElementById('city-search-input').value.trim();
            if(locationInput === "") return;
            fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(locationInput), { headers: { 'User-Agent': 'StormStream/1.0' } })
                .then(res => res.json()).then(resData => { if(resData.length > 0) map.setView([parseFloat(resData[0].lat), parseFloat(resData[0].lon)], 6); });
        }
    </script>
</body>
</html>
